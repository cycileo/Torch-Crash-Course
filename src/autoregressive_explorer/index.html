<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Autoregressive Explorer</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e2e2e2;
            --btn-bg: #4c1d95;
            --btn-hover: #5b21b6;
            --highlight-bg: rgba(76, 29, 149, 0.5);
            --dim-opacity: 0.3;
            --tooltip-bg: #16202b;
            --border-color: #3f3f46;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            /* Prevent accidental text selection on spam-click */
        }

        .controls-card {
            flex-shrink: 0;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        input[type="text"], input[type="number"] {
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        #seed-input { width: 150px; }
        #max-tokens-input, #temp-val-input, #top-k-input { 
            width: 45px; 
            text-align: center;
            padding: 8px 4px;
        }
        #max-tokens-input { -moz-appearance: textfield; }
        #max-tokens-input::-webkit-inner-spin-button,
        #max-tokens-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            padding: 8px 16px;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--btn-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--btn-bg);
            cursor: pointer;
        }

        .sequence-display {
            flex-grow: 1;
            overflow-y: auto;
            font-family: "JetBrains Mono", Consolas, Menlo, monospace;
            font-size: 18px;
            line-height: 1.6;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            align-content: flex-start;
        }

        .token {
            display: inline-block;
            vertical-align: top;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: pre;
        }

        .token-start {
            color: #10b981;
            opacity: 0.8;
            font-weight: bold;
            font-size: 0.8em;
            margin-right: 2px;
            user-select: none;
        }

        .token-newline {
            display: inline-block;
            color: #fbbf24;
            opacity: 0.8;
        }

        @keyframes flashYellow {
            0% {
                background-color: rgba(250, 204, 21, 0.8);
                color: black;
            }

            100% {
                background-color: transparent;
            }
        }

        .flash-new {
            animation: flashYellow 0.8s ease-out forwards;
        }

        .token:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .highlighted {
            background-color: var(--highlight-bg) !important;
            box-shadow: 0 0 0 2px var(--highlight-bg);
        }

        .dimmed {
            opacity: var(--dim-opacity);
        }

        .tooltip {
            position: fixed;
            background: var(--tooltip-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
            font-family: "JetBrains Mono", Consolas, Menlo, monospace;
            font-size: 12px;
            min-width: 260px;
            max-width: 380px;
            pointer-events: none;
        }

        .tooltip-header {
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 8px;
            text-align: center;
            color: #a78bfa;
        }

        .prob-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .prob-label {
            width: {{LABEL_WIDTH}};
            text-align: right;
            margin-right: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            padding: 2px 5px;
            color: #fbbf24;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .prob-bar-container {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.5);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prob-bar-fill {
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            height: 100%;
            transition: width 0.1s ease-out;
            width: 0%;
        }

        .prob-value {
            width: 45px;
            text-align: right;
            margin-left: 8px;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <div class="controls-card">
        <div class="controls-row">
            <input type="text" id="seed-input" value="{{DEFAULT_SEED}}" placeholder="Seed Text">
            <button id="set-seed-btn">Set Seed</button>
            <button id="generate-btn">Generate Next Token</button>

            <div class="toggle-group" style="margin-left: 10px;">
                <button id="auto-gen-btn">Auto-Generate</button>
                <input type="number" id="max-tokens-input" value="200" min="1" max="1000">
                <span style="font-size: 14px; opacity: 0.8;">Tokens</span>
                <span id="tok-speed" style="font-size: 13px; opacity: 0.7; display: none; margin-left: 4px;"></span>
            </div>
        </div>

        <div class="controls-row" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
            <div class="slider-group">
                <label for="temp-slider">Temp:</label>
                <input type="range" id="temp-slider" min="0" max="100" step="1" value="50" style="width: 150px;">
                <input type="number" id="temp-val-input" min="0" step="0.01" value="1.0">
                <button id="temp-reset-btn" title="Reset to 1.0" style="padding: 4px 8px; font-size: 12px;">↺</button>
            </div>

            <div class="toggle-group" style="margin-left: 15px; border-left: 1px solid var(--border-color); padding-left: 15px;">
                <label for="top-k-input">Top-K:</label>
                <input type="number" id="top-k-input" min="1" max="25" value="10">
                <div class="toggle-group" style="margin-left: 8px;">
                    <input type="checkbox" id="sample-topk-chk">
                    <label for="sample-topk-chk" style="font-size: 14px; cursor: pointer;">Sample from Top-K</label>
                </div>
            </div>
        </div>
    </div>

    <div class="sequence-display" id="sequence-display"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        // State variables
        let sequence = []; // Array of { char: 'A', nextLogits: [{char, logit}, ...] | null }
        let isAutoGenerating = false;

        // DOM Elements
        const seedInput = document.getElementById('seed-input');
        const setSeedBtn = document.getElementById('set-seed-btn');
        const generateBtn = document.getElementById('generate-btn');
        const autoGenBtn = document.getElementById('auto-gen-btn');
        const maxTokensInput = document.getElementById('max-tokens-input');
        const tokSpeedEl = document.getElementById('tok-speed');
        const tempSlider = document.getElementById('temp-slider');
        const tempValInput = document.getElementById('temp-val-input');
        const tempResetBtn = document.getElementById('temp-reset-btn');
        const topKInput = document.getElementById('top-k-input');
        const sampleTopKChk = document.getElementById('sample-topk-chk');
        const display = document.getElementById('sequence-display');
        const tooltip = document.getElementById('tooltip');

        function getTemperature() {
            const t = parseFloat(tempValInput.value);
            return (isNaN(t) || t === 0) ? 1e-9 : t;
        }

        function getTopK() {
            return parseInt(topKInput.value) || 10;
        }

        function getSampleTopK() {
            return sampleTopKChk.checked;
        }

        function getSnappedTemp(val) {
            // Fix floating point noise first
            val = Math.round(val * 100) / 100;
            
            let step = 0.01;
            if (val >= 19.95) step = 10.0;
            else if (val >= 1.95) step = 1.0;
            else if (val >= 0.195) step = 0.1;
            else step = 0.01;

            // Snap to the grid defined by the step
            let snapped = Math.round(val / step) * step;
            
            // To be extra safe, if we hit a boundary, re-verify the step
            // so the NEXT click uses the right resolution.
            if (snapped >= 19.99) step = 10.0;
            else if (snapped >= 1.99) step = 1.0;
            else if (snapped >= 0.199) step = 0.1;
            else step = 0.01;

            return { val: parseFloat(snapped.toFixed(2)), step: step };
        }

        function updateTempUI(val, updateInput = true, updateSlider = true) {
            const { val: snapped, step } = getSnappedTemp(val);
            
            if (updateInput) {
                tempValInput.value = snapped.toString();
                tempValInput.step = step.toString();
            }
            if (updateSlider) {
                const s = 25 * (Math.log10(snapped) + 2);
                tempSlider.value = Math.round(Math.max(0, Math.min(100, s)));
            }
            return snapped;
        }

        // Initialize display values
        updateTempUI(1.0);

        tempSlider.addEventListener('input', () => {
            const s = parseInt(tempSlider.value);
            // Logarithmic mapping: s=0 -> 0.01, s=50 -> 1.0, s=100 -> 100.0
            const rawVal = Math.pow(10, (s / 25) - 2);
            updateTempUI(rawVal, true, false); // Don't update slider, it's the source
        });

        tempValInput.addEventListener('input', () => {
            const val = parseFloat(tempValInput.value);
            if (!isNaN(val) && val > 0) {
                // For live typing, just update the slider position and step resolution
                const { step } = getSnappedTemp(val);
                tempValInput.step = step.toString();
                const s = 25 * (Math.log10(val) + 2);
                tempSlider.value = Math.round(Math.max(0, Math.min(100, s)));
            }
        });

        // When user finishes typing or click arrows, force hard snap
        tempValInput.addEventListener('change', () => {
            const val = parseFloat(tempValInput.value);
            if (!isNaN(val) && val > 0) {
                updateTempUI(val);
            }
        });

        tempResetBtn.addEventListener('click', () => {
            updateTempUI(1.0);
        });

        function computeSoftmax(logitsObjArray, temp) {
            // Backend now returns absolute probabilities.
            // If the backend already provided probabilities, return them.
            if (logitsObjArray.length > 0 && 'prob' in logitsObjArray[0]) {
                return logitsObjArray;
            }

            // Fallback for MiniGPT or cases where only logits are provided
            let maxLogit = -Infinity;
            for (let i = 0; i < logitsObjArray.length; i++) {
                if (logitsObjArray[i].logit > maxLogit) maxLogit = logitsObjArray[i].logit;
            }

            let sumExp = 0;
            const exps = logitsObjArray.map(item => {
                const e = Math.exp((item.logit - maxLogit) / temp);
                sumExp += e;
                return { char: item.char, exp: e };
            });

            return exps.map(item => ({
                char: item.char,
                prob: item.exp / sumExp
            }));
        }

        function sample(probs) {
            const r = Math.random();
            let cumulative = 0;
            for (let i = 0; i < probs.length; i++) {
                cumulative += probs[i].prob;
                if (r <= cumulative) return probs[i].char;
            }
            return probs[probs.length - 1].char; // Fallback to last due to float precision
        }

        // UI Interactions
        tempSlider.addEventListener('input', (e) => {
            tempVal.textContent = parseFloat(e.target.value).toFixed(1);
        });

        async function requestAllLogits(currentString) {
            const temp = getTemperature();
            const topK = getTopK();
            const sampleTopK = getSampleTopK();
            try {
                const res = await fetch('get_logits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: currentString, 
                        return_all: true, 
                        temperature: temp, 
                        top_k: topK, 
                        sample_from_top_k: sampleTopK 
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.error("Failed to fetch all logits:", error);
                return null;
            }
        }

        async function initSeed() {
            const text = seedInput.value;
            sequence = [];
            
            // Flush backend tensor memory before re-fetching (awaited to ensure ordering)
            await fetch('reset_memory', { method: 'POST', headers: { 'Content-Type': 'application/json' } }).catch(() => {});

            const data = await requestAllLogits(text);
            if (!data) return;

            const currentTemp = getTemperature();
            const currentTopK = getTopK();
            const currentSampleTopK = getSampleTopK();
            const allLogits = data.top10_all;
            const tokenStrings = data.tokens;

            // Unconditional start marker gets the first logit distribution (from BOS token)
            sequence.push({ 
                char: '►', 
                isStartMarker: true, 
                nextLogits: allLogits[0],
                fetchedTemp: currentTemp,
                fetchedTopK: currentTopK,
                fetchedSampleTopK: currentSampleTopK
            });
            
            // Push each token from the seed
            for (let i = 0; i < tokenStrings.length; i++) {
                sequence.push({ 
                    char: tokenStrings[i], 
                    nextLogits: allLogits[i + 1] || null,
                    fetchedTemp: currentTemp,
                    fetchedTopK: currentTopK,
                    fetchedSampleTopK: currentSampleTopK
                });
            }
            
            renderSequence();
        }

        function renderSequence() {
            display.innerHTML = '';
            sequence.forEach((item, index) => {
                const span = document.createElement('span');
                span.className = 'token';
                if (item.isStartMarker) {
                    span.textContent = item.char;
                    span.classList.add('token-start');
                } else if (item.char === '\n' || item.char === '\\n') {
                    span.textContent = '↵';
                    span.classList.add('token-newline');
                } else {
                    span.textContent = item.char;
                }

                span.addEventListener('mouseenter', (e) => handleHoverStart(e, index));
                span.addEventListener('mouseleave', handleHoverEnd);
                span.addEventListener('click', () => handleRevert(index));

                display.appendChild(span);
                
                // If it's a newline, force a flex break
                if (item.char === '\n' || item.char === '\\n') {
                    const br = document.createElement('div');
                    br.style.width = '100%';
                    display.appendChild(br);
                }
            });
        }

        function appendTokenNode(item, index, shouldFlash = true) {
            const span = document.createElement('span');
            span.className = shouldFlash ? 'token flash-new' : 'token';
            if (item.char === '\n' || item.char === '\\n') {
                span.textContent = '↵';
                span.classList.add('token-newline');
            } else {
                span.textContent = item.char;
            }

            span.addEventListener('mouseenter', (e) => handleHoverStart(e, index));
            span.addEventListener('mouseleave', handleHoverEnd);
            span.addEventListener('click', () => handleRevert(index));

            display.appendChild(span);

            // If it's a newline, force a flex break
            if (item.char === '\n' || item.char === '\\n') {
                const br = document.createElement('div');
                br.style.width = '100%';
                display.appendChild(br);
            }
        }

        async function handleHoverStart(e, index) {
            // Didactic highlighting logic
            const tokens = document.querySelectorAll('.token');
            tokens.forEach((t, i) => {
                if (i <= index) t.classList.add('highlighted');
                else t.classList.add('dimmed');
            });

            const item = sequence[index];
            if (item.nextLogits) {
                const currentTemp = getTemperature();
                const currentTopK = getTopK();
                const currentSampleTopK = getSampleTopK();
                
                // If any relevant parameter changed, re-fetch
                const needsRefetch = (item.fetchedTemp !== undefined && Math.abs(item.fetchedTemp - currentTemp) > 0.01) ||
                                   (item.fetchedTopK !== undefined && item.fetchedTopK !== currentTopK) ||
                                   (item.fetchedSampleTopK !== undefined && item.fetchedSampleTopK !== currentSampleTopK);

                if (needsRefetch) {
                    const textUpToHere = sequence.slice(0, index + 1).filter(s => !s.isStartMarker).map(s => s.char).join('');
                    const res = await fetch('get_logits', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            text: textUpToHere, 
                            temperature: currentTemp,
                            top_k: currentTopK,
                            sample_from_top_k: currentSampleTopK
                        })
                    });
                    const data = await res.json();
                    if (!data.error) {
                        item.nextLogits = data.top10;
                        item.nextData = data;
                        item.fetchedTemp = currentTemp;
                        item.fetchedTopK = currentTopK;
                        item.fetchedSampleTopK = currentSampleTopK;
                    }
                }
                showTooltip(e, index, item);
            }
        }

        function handleHoverEnd() {
            const tokens = document.querySelectorAll('.token');
            tokens.forEach(t => {
                t.classList.remove('highlighted', 'dimmed');
            });
            tooltip.style.display = 'none';
        }

        async function handleRevert(index) {
            if (index === sequence.length - 1 && !isAutoGenerating) {
                await runGenerationStep();
                return;
            }

            sequence = sequence.slice(0, index + 1);
            renderSequence();

            if (sequence.length > 0 && !sequence[sequence.length - 1].nextLogits) {
                const resData = await requestLogits();
                if (resData) {
                    sequence[sequence.length - 1].nextLogits = resData.top10;
                    sequence[sequence.length - 1].nextData = resData;
                    sequence[sequence.length - 1].fetchedTemp = getTemperature();
                    sequence[sequence.length - 1].fetchedTopK = getTopK();
                    sequence[sequence.length - 1].fetchedSampleTopK = getSampleTopK();
                }
            }
        }

        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatChar(char) {
            if (char === '') return '∅';
            // Normalize whitespace-only tokens for readability
            if (char === ' ') return '·';
            if (/^ +$/.test(char)) return '·'.repeat(char.length);
            // Escape and replace internal newlines/tabs for display
            let display = escapeHtml(char);
            display = display.replace(/\n/g, '↵').replace(/\t/g, '→');
            return display;
        }

        function showTooltip(e, index, item) {
            const temp = getTemperature();
            // nextLogits now contains the top10 list with absolute probabilities
            const probs = computeSoftmax(item.nextLogits, temp);

            // Sort descending by probability
            probs.sort((a, b) => b.prob - a.prob);

            const prevText = sequence.slice(0, index + 1).filter(s => !s.isStartMarker).map(s => s.char).join('');
            const displayPrevText = prevText.length > 30 ? '...' + prevText.slice(-30) : prevText;
            const headerText = displayPrevText.replace(/\n/g, '↵').replace(/\t/g, '→');
            const headerEscaped = escapeHtml(headerText);

            let html = `<div class="tooltip-header">P( next | "${headerEscaped}" )</div>`;

            probs.forEach(p => {
                const pct = (p.prob * 100).toFixed(1);
                const label = formatChar(p.char);
                html += `
                    <div class="prob-row">
                        <div class="prob-label" title="${escapeHtml(p.char)}">${label}</div>
                        <div class="prob-bar-container">
                            <div class="prob-bar-fill" style="width: ${pct}%"></div>
                        </div>
                        <div class="prob-value">${pct}%</div>
                    </div>
                `;
            });

            tooltip.innerHTML = html;
            tooltip.style.display = 'block';

            const tooltipRect = tooltip.getBoundingClientRect();
            const tokenRect = e.target.getBoundingClientRect();
            const padding = 15;

            // Default: Place to the right of the character
            let leftPos = tokenRect.right + 15;

            // If it hits the right edge of the screen, flip to the left side
            if (leftPos + tooltipRect.width > window.innerWidth - padding) {
                leftPos = tokenRect.left - tooltipRect.width - 15;
            }

            // Ensure we don't bleed off the left edge
            if (leftPos < padding) leftPos = padding;

            // Align the top of the tooltip with the top of the character so it extends DOWNWARDS (as low as possible)
            let topPos = tokenRect.top;

            // Safety Clamp vertical so it doesn't go off top or bottom
            if (topPos + tooltipRect.height > window.innerHeight - padding) {
                topPos = window.innerHeight - tooltipRect.height - padding;
            }
            if (topPos < padding) {
                topPos = padding;
            }

            // Handle massive tooltips (scroll fallback)
            if (tooltipRect.height > window.innerHeight - (padding * 2)) {
                topPos = padding;
                tooltip.style.maxHeight = (window.innerHeight - 2 * padding) + 'px';
                tooltip.style.overflowY = 'auto';
            } else {
                tooltip.style.maxHeight = 'none';
                tooltip.style.overflowY = 'visible';
            }

            tooltip.style.left = leftPos + 'px';
            tooltip.style.top = topPos + 'px';
        }

        // Backend Integration
        async function requestLogits() {
            const currentString = sequence.filter(s => !s.isStartMarker).map(s => s.char).join('');
            const temp = getTemperature();
            const topK = getTopK();
            const sampleTopK = getSampleTopK();
            try {
                const res = await fetch('get_logits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: currentString, 
                        temperature: temp, 
                        top_k: topK, 
                        sample_from_top_k: sampleTopK 
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.error("Failed to fetch logits:", error);
                isAutoGenerating = false;
                autoGenBtn.textContent = 'Auto-Generate';
                generateBtn.disabled = false;
                maxTokensInput.disabled = false;
                return null;
            }
        }

        async function runGenerationStep(shouldFlash = true) {
            let resData = sequence.length > 0 ? sequence[sequence.length - 1].nextData : null;
            const currentTemp = getTemperature();
            const currentTopK = getTopK();
            const currentSampleTopK = getSampleTopK();

            if (!resData) {
                resData = await requestLogits();
                if (!resData) return;
                if (sequence.length > 0) {
                    sequence[sequence.length - 1].nextLogits = resData.top10;
                    sequence[sequence.length - 1].nextData = resData;
                    sequence[sequence.length - 1].fetchedTemp = currentTemp;
                    sequence[sequence.length - 1].fetchedTopK = currentTopK;
                    sequence[sequence.length - 1].fetchedSampleTopK = currentSampleTopK;
                }
            }

            const nextChar = resData.sampled_char;

            const newItem = { char: nextChar, nextLogits: null, nextData: null, fetchedTemp: undefined, fetchedTopK: undefined, fetchedSampleTopK: undefined };
            sequence.push(newItem);

            // Append the token to the display specifically instead of recreating all existing tokens
            appendTokenNode(newItem, sequence.length - 1, shouldFlash);

            const nextResData = await requestLogits();
            if (nextResData && sequence.length > 0) {
                sequence[sequence.length - 1].nextLogits = nextResData.top10;
                sequence[sequence.length - 1].nextData = nextResData;
                sequence[sequence.length - 1].fetchedTemp = currentTemp;
                sequence[sequence.length - 1].fetchedTopK = currentTopK;
                sequence[sequence.length - 1].fetchedSampleTopK = currentSampleTopK;
            }
        }

        generateBtn.addEventListener('click', runGenerationStep);

        display.addEventListener('click', async (e) => {
            // Only fire if we clicked directly on the sequence display background, not on a token token
            if (e.target.id === 'sequence-display' && !isAutoGenerating) {
                await runGenerationStep();
            }
        });

        autoGenBtn.addEventListener('click', async () => {
            if (isAutoGenerating) {
                isAutoGenerating = false;
                autoGenBtn.textContent = 'Auto-Generate';
                generateBtn.disabled = false;
                maxTokensInput.disabled = false;
            } else {
                isAutoGenerating = true;
                autoGenBtn.textContent = 'Stop Generation';
                generateBtn.disabled = true;
                maxTokensInput.disabled = true;

                const maxTokens = parseInt(maxTokensInput.value, 10) || 200;
                let generatedCount = 0;
                let tStart = performance.now();

                while (isAutoGenerating && generatedCount < maxTokens) {
                    await runGenerationStep(false);
                    generatedCount++;
                    const elapsed = (performance.now() - tStart) / 1000;
                    const tps = (generatedCount / elapsed).toFixed(1);
                    tokSpeedEl.textContent = `${tps} tok/s`;
                    tokSpeedEl.style.display = 'inline';
                    // Slight delay for visual rhythm
                    await new Promise(r => setTimeout(r, 70));
                }

                isAutoGenerating = false;
                autoGenBtn.textContent = 'Auto-Generate';
                generateBtn.disabled = false;
                maxTokensInput.disabled = false;
                tokSpeedEl.style.display = 'none';
            }
        });

        // Initialize display
        setSeedBtn.addEventListener('click', initSeed);
        initSeed();

    </script>
</body>

</html>
